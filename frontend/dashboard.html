<!DOCTYPE html>
<html>
<head>
  <title>ZOY Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    }

    .status {
      color: #22c55e;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>⚡ ZOY Cloud Dashboard</h1>

<div class="grid" id="list"></div>

<script>
  async function loadServers() {
    const res = await fetch("https://atm-first-code.onrender.com/servers");
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(server => {
      const div = document.createElement("div");
      div.className = "card";

     div.innerHTML = `
  <h3>${server.name}</h3>
  <div class="status">Running 🟢</div>
  <button onclick="deleteServer('${server.name}')">Delete ❌</button>
`;

      list.appendChild(div);
    });

    async function deleteServer(name) {
  await fetch("https://atm-first-code.onrender.com/delete-server?name=" + name, {
    method: "DELETE"
  });

  loadServers();
}
  }

  loadServers();
</script>

</body>
</html>
